<header class="border-bottom bg-white">
  <nav class="navbar navbar-expand-lg container py-2">
    <a class="navbar-brand fw-semibold" href="{% url 'core:home' %}">FasoKalanB</a>
    <div class="ms-auto d-flex gap-2">
      {% if user.is_authenticated %}
        <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
          {% csrf_token %}
          <button class="btn btn-outline-secondary btn-sm" type="submit">Déconnexion</button>
        </form>
        <a class="btn btn-primary btn-sm" href="{% url 'dashboard:home' %}">Dashboard</a>
      {% else %}
        <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:login' %}">Connexion</a>
      {% endif %}
    </div>
  </nav>
</header>
