<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FasoKalanB{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
  <header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg container py-2">
      <a class="navbar-brand fw-semibold" href="{% url 'core:home' %}">FasoKalanB</a>
      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-primary btn-sm" href="/accounts/login/">Connexion</a>
        <a class="btn btn-primary btn-sm" href="/dashboard/">Dashboard</a>
      </div>
    </nav>
  </header>

  <main class="container py-5 flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-top bg-white py-3">
    <div class="container text-muted small">&copy; FasoKalanB</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
