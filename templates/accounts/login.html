{% extends "base.html" %}

{% block title %}Connexion · FasoKalanB{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-md-5">
        <h1 class="h4 mb-3 text-center">Connexion</h1>
        <p class="text-muted text-center mb-4">Accédez à votre espace FasoKalanB.</p>

        {% if form.errors %}
          <div class="alert alert-danger" role="alert">
            Identifiants invalides. Merci de réessayer.
          </div>
        {% endif %}

        <form method="post" novalidate>
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_username" class="form-label">Nom d'utilisateur</label>
            <input
              type="text"
              name="username"
              id="id_username"
              class="form-control"
              autocomplete="username"
              required
              autofocus
            >
          </div>

          <div class="mb-4">
            <label for="id_password" class="form-label">Mot de passe</label>
            <input
              type="password"
              name="password"
              id="id_password"
              class="form-control"
              autocomplete="current-password"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
